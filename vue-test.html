<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vue测试</title>
</head>
<body>
  <div id="app">
    <nav>
      <a v-for="item in navItems" :key="item.path" :href="item.path">
        {{ item.name }}
      </a>
    </nav>
  </div>

  <script src="https://unpkg.com/vue@3.4.21/dist/vue.global.js"></script>
  <script>
    const { createApp } = Vue;

    createApp({
      data() {
        return {
          navItems: [
            { name: '首页', path: 'index.html' },
            { name: '关于正奇', path: 'about.html' },
            { name: '核心团队', path: 'team.html' }
          ]
        };
      }
    }).mount('#app');
  </script>
</body>
</html>
